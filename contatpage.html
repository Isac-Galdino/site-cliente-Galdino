<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contatpage</title>
    <link rel="stylesheet" href="../css/contatpage.css">
</head>
<body>

<header>
    <a href = "index.html"><button class = "HomeButton"><img src = "../images/houseicon.png" class = "HomeButton-image"></button></a>
    <div class="logo">
        <img src="../images/larticon.webp" class = "logo">

    </div>

    <div class="aba-contato">
        CONTATO
    </div>
</header>

<main class="container">

    <section class="formulario">

        <div class="titulo-box">
            <div class="linha-titulo"></div>

            <h2>Cadastre-se</h2>

            <div class="linha-titulo"></div>
        </div>
        <div>
            <form>
                <label>Nome completo</label>
                <input type="text" placeholder = "Digite seu nome completo" class = "form-input">
                <label>Telefone</label>
                <input type="phone" placeholder = "Digite um número de telefone válido" class = "form-input">
                <label>E-mail</label>
                <input type="email" placeholder = "Digite um E-mail válido" class = "form-input">
                <input type="submit" value="Enviar" class="invitebutton">
        </form>

        </div>
    </section>

    <section class="contato">

        <div class="caixa-contato">
            <div class = "item-contato">
                <img src = "../images/telefone.png" class = "icon" alt = "contato via telefone celular">
                <p>(11) 3885-2005</p>
            </div>
            <div class = "item-contato">
                <img src = "../images/logowhatsapp.png" class = "icon" alt = "contato via Whatsapp">
                <p>(11) 97841-7015</p>
            </div>
            <div class = "item-contato">
                <img src = "../images/location.png" class = "icon" alt = "localização da empresa/filial">
                <p>Avenida Hélio Pellegrino, 651 - Moema, São Paulo</p>
            </div>

        </div>

    </section>

</main>

<div class="triangulo"></div>

<footer>

    <div class="redes">
        <a href="https://www.instagram.com/lart.br?igsh=bGx0ejJtazIxbWZy">
            <img src="../images/instagramicon.png" alt="Instagram">
        </a>
        <a href="https://www.facebook.com/share/1BUTWwJkUN/">
            <img src="../images/facebookicon.png" alt="Facebook">
        </a>

        <a href="https://www.tiktok.com/@lart.br?_r=1&_t=ZS-978am7k2U6u">
            <img src="../images/tiktokicon.png" alt="TikTok">
        </a>
</div>
</footer>

</body>
</html>
